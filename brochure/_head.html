  }
  @font-face {
    font-family: 'DM Sans';
    src: url('fonts/DMSans-Medium.ttf');
    font-weight: 500;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('fonts/DMSans-Bold.ttf');
    font-weight: 700;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('fonts/DMSans-Italic.ttf');
    font-weight: 500;
    font-style: italic;
  }

  
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --black70: rgba(0,0,0,0.7);
    --white: #ffffff;
    --white70: rgba(255,255,255,0.7);
    --pine: #05290D;
    --linen: #F3F2F0;
    --yellow: #F2AF4B;
    --hairline: rgba(0,0,0,0.12);
    --hairline-light: rgba(255,255,255,0.18);
  }

  body {
    font-family: 'DM Sans', Helvetica, Arial, sans-serif;
    color: var(--black70);
    font-size: 10pt;
    line-height: 1.6;
    font-weight: 500;
  }

  .page {
    width: 210mm;
    height: 297mm;
    padding: 13mm 16mm;
    position: relative;
    page-break-after: always;
    overflow: hidden;
    background: var(--white);
  }
  .page:last-child { page-break-after: avoid; }

  h1, h2, h3, h4 {
    font-family: 'Erode', Georgia, serif;
    font-weight: 550;
    color: var(--black);
    line-height: 1.15;
  }
  h1 { font-size: 38pt; }
  h2 { font-size: 24pt; }
  h3 { font-size: 16pt; }
  h4 { font-size: 12.5pt; font-weight: 600; }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 8pt;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--black70);
  }
  .eyebrow.on-dark { color: var(--yellow); }
  .eyebrow.accent { color: var(--pine); }

  .rule {
    width: 16mm;
    height: 2px;
    background: var(--yellow);
    margin: 4mm 0;
  }

  /* ---------- COVER ---------- */
  .cover {
    padding: 0;
    background: var(--pine);
    color: var(--white);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .cover .illustration-wrap { position: relative; width: 100%; height: 122mm; overflow: hidden; flex-shrink: 0; background: #F7E9C9; }
  .cover .illustration {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    display: block;
  }
  .cover .illustration-wrap::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0; height: 22mm;
    background: linear-gradient(180deg, rgba(5,41,13,0) 0%, rgba(5,41,13,0.95) 100%);
  }
  .cover .logo-badge {
    position: absolute; top: 10mm; left: 16mm; z-index: 2;
    height: 7mm;
  }
  .cover .body {
    flex: 1;
    padding: 10mm 16mm 12mm 16mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .cover .content { margin-top: 0; }
  .cover h1 {
    color: var(--white);
    font-size: 52pt;
    margin-bottom: 0;
  }
  .cover .meta-bottom {
    position: absolute; bottom: 12mm; left: 16mm; right: 16mm;
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--hairline-light);
    padding-top: 4mm;
    font-size: 8pt; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--white70);
  }
  .cover .cover-tagline {
    font-family: 'Erode', serif; font-style: italic; font-weight: 550;
    font-size: 13pt; color: var(--yellow); margin-top: 5mm; margin-bottom: 2mm;
  }
  .cover .cover-meta-line {
    font-family: 'DM Sans', sans-serif; font-size: 9pt;
    letter-spacing: 0.08em; color: var(--white70); text-transform: uppercase;
  }
    font-weight: 600;
    font-size: 15pt;
    letter-spacing: 0.02em;
    color: var(--yellow); margin-bottom: 4mm;
  }

  /* ---------- PAGE HEADER ---------- */
  .page-head { margin-bottom: 4mm; }
  .page-head h2 { margin-top: 1mm; }
  .page .sched-page h2 { font-size: 21pt; }

  .intro-text {
    font-size: 10pt;
    max-width: 160mm;
    margin-bottom: 5mm;
    line-height: 1.75;
  }

  .page-num {
    position: absolute; bottom: 9mm; right: 16mm;
    font-family: 'DM Sans', sans-serif;
    font-size: 7.5pt; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--black70);
  }
  .page-num.on-dark { color: var(--white70); }

  /* ---------- PAGE LOGO (all pages except cover) ---------- */
  .page-logo {
    position: absolute; top: 10mm; right: 16mm;
    height: 5.5mm; opacity: 0.7;
  }

  /* delegates leave with */
  .leave-with { margin-top: 5mm; }
  .leave-with .eyebrow { display: block; margin-bottom: 3mm; }
  .leave-grid {
    display: flex; flex-wrap: wrap; gap: 2mm 5mm;
  }
  .leave-item {
    width: 47%; display: flex; align-items: flex-start; gap: 2.5mm;
    font-size: 8.5pt; color: var(--black70); line-height: 1.45;
  }
  .leave-check {
    width: 4.5mm; height: 4.5mm; border-radius: 50%; background: var(--yellow);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 0.5mm;
  }
  .leave-check svg { display: block; }

  /* who you'll meet */
  .meet-section { margin-top: 5mm; }
  .meet-section .eyebrow { display: block; margin-bottom: 3mm; border-bottom: 2px solid var(--yellow); padding-bottom: 2mm; }
  .meet-grid {
    display: flex; flex-wrap: wrap;
  }
  .meet-item {
    width: 33.33%; padding: 2.5mm 3mm 2.5mm 3mm;
    font-size: 8.5pt; color: var(--black); font-weight: 600;
    border-left: 2px solid var(--pine); border-bottom: 1px solid var(--hairline);
    line-height: 1.3;
  }
  .meet-item:nth-child(3n+1) { border-left: none; padding-left: 0; }

  /* ---------- ABOUT ---------- */
  .stat-row { display: flex; gap: 0; margin-top: 8mm; border-top: 2px solid var(--black); }
  .stat { flex: 1; padding: 4mm 0; border-right: 1px solid var(--hairline); padding-right: 6mm; padding-left: 6mm; }
  .stat:first-child { padding-left: 0; }
  .stat:last-child { border-right: none; }
  .stat .num {
    font-family: 'Erode', serif; font-size: 28pt; color: var(--black);
    font-weight: 550; line-height: 1;
  }
  .stat .num em { font-style: italic; color: var(--pine); }
  .stat .cap {
    font-size: 8pt; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--black70); margin-top: 2mm; line-height: 1.4;
  }

  /* venue inline on about page */
  .venue-inline {
    display: flex; gap: 6mm; margin-top: 7mm;
    border-top: 1px solid var(--hairline); padding-top: 6mm;
  }
  .venue-inline-photos {
    display: flex; flex-direction: column; gap: 3mm; flex-shrink: 0; width: 88mm;
  }
  .venue-inline-photos img {
    width: 100%; height: 40mm; object-fit: cover; border-radius: 10px; display: block;
  }
  .venue-inline-info { flex: 1; }
  .venue-inline-name {
    font-family: 'Erode', serif; font-weight: 550; font-size: 16pt;
    color: var(--black); margin-bottom: 3mm;
  }
  .venue-inline-desc {
    font-size: 9.5pt; color: var(--black70); line-height: 1.6; margin-bottom: 5mm;
  }
  .venue-inline-detail {
    font-size: 9.5pt; color: var(--black70); line-height: 1.6;
    margin-bottom: 2mm; display: flex; align-items: baseline; gap: 2mm;
  }
  .vi {
    font-size: 10pt; flex-shrink: 0;
  }


  .quote-card {
    margin-top: 8mm;
    background: var(--linen);
    border-radius: 14px;
    padding: 8mm;
    display: flex;
    gap: 6mm;
    align-items: center;
  }
  .quote-card img {
    width: 38mm; height: 38mm; object-fit: cover;
    border-radius: 14px; flex-shrink: 0;
  }
  .quote-card p {
    font-family: 'Erode', serif;
    font-style: italic;
    font-weight: 550;
    font-size: 13pt;
    line-height: 1.5;
    color: var(--black);
  }

  .photo-collage { display: flex; gap: 5mm; margin-top: 6mm; }
  .photo-collage figure { width: 50%; }
  .photo-collage img {
    width: 100%; height: 58mm; object-fit: cover; border-radius: 12px; display: block;
  }
  .photo-collage figcaption {
    font-size: 7.5pt; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--black70); margin-top: 2mm;
  }

  /* ---------- PROGRAMME ---------- */
  .day-tag {
    display: inline-block;
    font-size: 8pt; letter-spacing: 0.12em; text-transform: uppercase;
    background: var(--pine); color: var(--white);
    padding: 2mm 5mm; border-radius: 100px; margin-bottom: 3mm;
    font-weight: 500;
  }
  .sched { width: 100%; border-collapse: collapse; }
  .sched tr { border-bottom: 1px solid var(--hairline); }
  .sched tr:last-child { border-bottom: none; }
  .sched td { padding: 1.3mm 0; vertical-align: top; }
  .sched .time {
    font-size: 9.5pt; font-weight: 700; color: var(--black); width: 26mm; white-space: nowrap;
  }
  .sched .session h4 { margin-bottom: 0.6mm; font-size: 10.6pt; }
  .sched .session p { font-size: 8.1pt; color: var(--black70); line-height: 1.32; }
  .tbc {
    display: inline-block;
    font-size: 7pt; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--black); background: var(--yellow);
    padding: 0.6mm 2.4mm; border-radius: 100px; margin-left: 2mm;
    font-weight: 700; vertical-align: middle;
  }
  .placeholder-note {
    font-size: 8.5pt; color: var(--black70); font-style: italic;
    margin-top: 5mm; border: 1px dashed rgba(0,0,0,0.3);
    border-radius: 12px; padding: 4mm 5mm; background: var(--linen);
  }

  /* session type tags */
  .stype {
    display: inline-block; font-size: 7pt; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 700; padding: 0.5mm 2.5mm; border-radius: 100px; margin-right: 2mm;
    vertical-align: middle; position: relative; top: -0.5mm;
  }
  .stype-panel { background: var(--linen); color: var(--pine); }
  .stype-keynote { background: var(--pine); color: var(--yellow); }
  .stype-workshop { background: var(--yellow); color: var(--pine); }
  .stype-social { background: transparent; color: var(--black70); border: 1px solid var(--hairline); }

  /* social row (Porto walk, dinner) distinct */
  .sched tr.row-social td { padding: 2.2mm 0; }
  .sched tr.row-social .session h4 { color: var(--black70); font-style: italic; font-weight: normal; }
  .sched tr.row-social .time { color: var(--black70); }

  /* break rows quieter */
  .sched tr.row-break td { padding: 1mm 0; }
  .sched tr.row-break .session h4 { font-size: 9pt; color: var(--black70); font-weight: 500; }
  .sched tr.row-break .time { color: var(--black70); font-size: 9pt; font-weight: 500; }

  /* who attends */
  .audience-grid { display: flex; flex-wrap: wrap; gap: 5mm; margin-top: 6mm; }
  .audience-card {
    width: 47%; background: var(--linen); border-radius: 14px; padding: 7mm 6mm;
  }
  .audience-card h4 {
    font-family: 'Erode', serif; font-weight: 550; font-size: 14pt;
    margin-bottom: 3mm; color: var(--black);
  }
  .audience-card p { font-size: 9pt; color: var(--black70); line-height: 1.65; }

  /* porto page */
  .porto-split { display: flex; gap: 8mm; margin-top: 6mm; }
  .porto-text { flex: 1; }
  .porto-img-col { width: 72mm; flex-shrink: 0; }
  .porto-img-col img {
    width: 100%; height: 58mm; object-fit: cover; border-radius: 12px; display: block;
  }
  .porto-img-col img + img { margin-top: 3mm; }
  .why-list { list-style: none; margin-top: 4mm; }
  .why-list li {
    font-size: 9.5pt; color: var(--black70); padding: 2.5mm 0;
    border-bottom: 1px solid var(--hairline); line-height: 1.55;
  }
  .why-list li:last-child { border-bottom: none; }
  .why-list li strong { color: var(--black); display: block; font-size: 10pt; margin-bottom: 0.5mm; }

  /* back cover contact block */
  .contact-block { margin-top: 10mm; }
  .contact-detail {
    font-size: 10pt; color: var(--white70); margin-bottom: 2mm; line-height: 1.6;
  }
  .contact-detail strong { color: var(--yellow); font-weight: 700; }



  /* ---------- PARTNERSHIP TIERS ---------- */
  .tiers { display: flex; gap: 5mm; margin-top: 5mm; }
  .tier {
    flex: 1;
    background: var(--linen);
    border-radius: 14px;
    padding: 6mm 5mm;
  }
  .tier .badge {
    display: inline-block;
    font-size: 8pt; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 700; color: var(--black);
    padding: 1.2mm 4mm; border-radius: 100px; margin-bottom: 3mm;
  }
  .tier.bronze .badge { background: #D9C2A6; }
  .tier.silver .badge { background: #D9D9D9; }
  .tier.gold .badge { background: var(--yellow); }
  .tier .price {
    font-family: 'Erode', serif; font-weight: 700; font-size: 22pt;
    color: var(--black); margin-bottom: 3mm;
  }
  .tier .tier-desc { font-size: 8.5pt; color: var(--black70); margin-bottom: 3mm; line-height: 1.5; }
  .tier ul { list-style: none; }
  .tier li {
    font-size: 8.5pt; padding: 1.6mm 0; line-height: 1.4;
    border-bottom: 1px solid var(--hairline);
  }
  .tier li:last-child { border-bottom: none; }
  .tier li::before { content: "— "; color: var(--pine); font-weight: 700; }
  .tier .plus-label {
    font-size: 7.5pt; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--black70); margin: 3mm 0 1.5mm 0; font-weight: 700;
  }
  .tailor-note {
    font-size: 8.5pt; color: var(--black70); margin-top: 5mm; text-align: center;
    border-top: 1px solid var(--hairline); padding-top: 4mm;
  }

  /* ---------- PARTNERSHIP PHOTO STRIP ---------- */
  .partner-photos {
    display: flex; gap: 3mm; margin: 4mm 0 1.5mm;
    height: 38mm;
  }
  .partner-photos img {
    flex: 1; object-fit: cover; border-radius: 8px; display: block;
  }
  .partner-photos-caption {
    font-size: 7.5pt; color: var(--black70); text-align: center;
    font-style: italic; margin-bottom: 4mm;
  }

  .hero-photo-wrap { margin-top: 6mm; }
  .hero-photo {
    width: 100%; height: 85mm; object-fit: cover; border-radius: 12px; display: block;
  }
  .hero-photo-wrap figcaption {
    font-size: 7.5pt; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--black70); margin-top: 2mm;
  }

  .stats-band {
    background: var(--pine);
    border-radius: 14px;
    padding: 7mm 6mm;
    display: flex;
    justify-content: space-between;
    margin-top: 8mm;
  }
  .stats-band .stat-item { text-align: center; flex: 1; }
  .stats-band .num {
    font-family: 'Erode', serif; font-size: 22pt; font-weight: 550;
    color: var(--yellow);
  }
  .stats-band .cap {
    font-size: 7.5pt; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--white70); margin-top: 1mm;
  }

  .activation-row {
    display: flex; gap: 6mm; margin-top: 6mm;
    align-items: center;
  }
  .activation-row img {
    width: 45%; height: 50mm; object-fit: cover; border-radius: 12px; flex-shrink: 0;
  }
  .activation-text { flex: 1; }
  .activation-text p { font-size: 9pt; color: var(--black70); line-height: 1.6; margin-top: 1mm; }

  /* ---------- REGISTRATION ---------- */
  .reg-photos {
    display: flex; gap: 3mm; margin: 4mm 0 5mm;
    height: 40mm;
  }
  .reg-photos img {
    flex: 1; object-fit: cover; border-radius: 8px; display: block;
  }
  .reg-photos img:first-child { flex: 1.5; }

  .reg-pass-includes {
    background: var(--linen); border-radius: 10px;
    padding: 4mm 5mm; margin-bottom: 5mm;
  }
  .reg-pass-includes .eyebrow { display: block; margin-bottom: 3mm; }
  .reg-includes-grid {
    display: flex; flex-wrap: wrap; gap: 1.5mm 0;
  }
  .reg-includes-item {
    width: 33.33%; display: flex; align-items: center; gap: 2mm;
    font-size: 8.5pt; color: var(--black70); line-height: 1.4;
  }
  .reg-includes-item::before {
    content: "✓"; color: var(--yellow); font-weight: 700;
    font-size: 9pt; flex-shrink: 0;
  }

  .reg-table {
    width: 100%; border-collapse: collapse; margin-bottom: 5mm;
  }
  .reg-table thead tr { border-bottom: 2px solid var(--black); }
  .reg-table th {
    font-family: 'DM Sans', sans-serif;
    font-size: 7.5pt; letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 700; color: var(--black70);
    padding: 0 0 2.5mm 0; text-align: left;
  }
  .reg-col-right { text-align: right !important; width: 22mm; }
  .reg-table tbody tr { border-bottom: 1px solid var(--hairline); }
  .reg-table tbody tr:last-child { border-bottom: none; }
  .reg-table tbody td { padding: 4mm 0; vertical-align: top; }
  .reg-pass-name {
    font-family: 'Erode', serif; font-weight: 550; font-size: 13pt;
    color: var(--black); margin-bottom: 1mm;
  }
  .reg-pass-sub { font-size: 8pt; color: var(--black70); line-height: 1.5; }
  .reg-price {
    font-family: 'Erode', serif; font-size: 16pt; font-weight: 700;
    color: var(--black); text-align: right; white-space: nowrap;
    vertical-align: top; padding-top: 4mm;
  }
  .reg-complimentary {
    font-family: 'Erode', serif; font-size: 11pt; font-weight: 700;
    font-style: italic; color: var(--black); text-align: right;
    vertical-align: top; padding-top: 4mm; white-space: nowrap;
  }

  .reg-cta-box {
    background: var(--linen); border-left: 3px solid var(--yellow);
    border-radius: 0 8px 8px 0; padding: 4mm 5mm; margin-bottom: 5mm;
  }
  .reg-cta-box p { font-size: 9pt; color: var(--black70); line-height: 1.65; margin-bottom: 1.5mm; }
  .reg-cta-box p:last-child { margin-bottom: 0; }
  .reg-cta-box strong { color: var(--black); }

  .reg-btn {
    display: block; background: var(--pine); color: var(--white);
    text-align: center; padding: 4mm 0; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-weight: 700;
    font-size: 10pt; letter-spacing: 0.04em;
    text-decoration: none;
  }
  .reg-btn::after { content: " →"; }


  /* ---------- ADD-ONS ---------- */
  .addons { display: flex; flex-wrap: wrap; gap: 5mm; margin-top: 5mm; }
  .addon {
    width: 47%;
    background: var(--linen);
    border-radius: 14px;
    padding: 6mm;
  }
  .addon h4 { margin-bottom: 2mm; }
  .addon p { font-size: 9pt; color: var(--black70); line-height: 1.6; }

  /* ---------- VENUE / GALLERY ---------- */
  .venue-grid { margin-top: 6mm; }
  .venue-grid img {
    width: 100%; height: 90mm; object-fit: cover; border-radius: 12px; display: block;
  }
  .venue-grid figcaption {
    font-size: 7.5pt; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--black70); margin-top: 2mm;
  }
  .gallery-label { margin-top: 8mm; }
  .gallery-grid { display: flex; gap: 5mm; margin-top: 4mm; }
  .gallery-grid figure { width: 50%; }
  .gallery-grid img {
    width: 100%; height: 62mm; object-fit: cover; border-radius: 12px; display: block;
  }
  .gallery-grid figcaption {
    font-size: 7.5pt; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--black70); margin-top: 2mm;
  }
  .info-grid { display: flex; gap: 8mm; margin-top: 8mm; }
  .info-col { flex: 1; }
  .info-col .eyebrow { margin-bottom: 2mm; display: block; }
  .info-col p, .info-col li { font-size: 9.5pt; line-height: 1.7; }
  .info-col ul { list-style: none; }
  .info-col li::before { content: "— "; color: var(--pine); font-weight: 700; }

  /* ---------- BACK COVER ---------- */
  .back {
    background: var(--pine); color: var(--white);
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .back h2 { color: var(--white); font-size: 28pt; margin-bottom: 5mm; }
  .back .contact-line { font-size: 10pt; margin-bottom: 2mm; color: var(--white70); }
  .back .contact-line strong { color: var(--yellow); font-weight: 700; }
  .back .pill {
    display: inline-block;
    background: var(--yellow); color: var(--black);
    font-size: 8.5pt; font-weight: 700; letter-spacing: 0.04em;
    padding: 3mm 7mm; border-radius: 100px; margin-top: 6mm;
  }
  .back .footer-note {
    font-size: 7.5pt; letter-spacing: 0.04em; color: var(--white70);
    border-top: 1px solid var(--hairline-light); padding-top: 4mm; line-height: 1.7;
  }
  .back .next-steps {
    display: flex; gap: 6mm; margin-top: 14mm;
  }
  .back .step { flex: 1; }
  .back .step .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 8mm; height: 8mm; border-radius: 50%;
    background: var(--yellow); color: var(--pine);
    font-family: 'Erode', serif; font-weight: 700; font-size: 11pt;
    margin-bottom: 3mm;
  }
  .back .step h4 { color: var(--white); font-size: 11pt; margin-bottom: 1mm; }
